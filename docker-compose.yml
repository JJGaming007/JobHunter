version: "3.9"

services:
  job-hunter:
    build: .
    restart: always
    ports:
      - "5000:5000"        # Access at http://your-server-ip:5000
    volumes:
      - ./data:/app/data   # DB + logs persist across restarts
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
    env_file:
      - .env               # Your Gmail + LinkedIn credentials
